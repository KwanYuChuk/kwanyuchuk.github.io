  primary: "555555"
  primary-rgb: "85,85,85"
  secondary: "333333"
  secondary-dark: "222222"

# Footer settings
footer:
  copyright: Kwan Yu Chuk
  location: Location
  social: Around the Web
  # credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
