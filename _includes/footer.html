<!-- Footer -->
<footer class="text-center">

  <div class="footer-above">
    <div class="container">
      <div class="row">

        <div class="footer-col col-md-4">
          <h3>{{ site.footer.location }}</h3>
          <p>
            {% for adress in site.address %}
            {{ adress.line }} <br>
            {% endfor %}
          </p>
        </div>

        <div class="footer-col col-md-4">
          <h3>{{ site.footer.social }}</h3>

          <ul class="list-inline">
            {% for network in site.social %}
            <li>
              <a href="{{ network.url }}" class="btn-social btn-outline">
                <i class="fa-brands fa-fw fa-{{ network.title }}"></i>
              </a>
            </li>
            {% endfor %}
          </ul>

        </div>

        <div class="footer-col col-md-4">
          <h3>{{ site.footer.credits }}</h3>
          <p>{{ site.credits }}</p>
        </div>

      </div>
    </div>
  </div>

  <div class="footer-below">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          Copyright &copy;
          {{ site.footer.copyright }}
          20{{ site.time | date: '%y' }}
        </div>
      </div>
    </div>
  </div>

</footer>

<!-- Scroll Top Button -->
<div class="scroll-top page-scroll visible-xs visible-sm">
  <a class="btn btn-primary" href="#page-top">
    <i class="fa fa-chevron-up"></i>
  </a>
</div>

<!-- ============================== -->
<!-- GIS Portfolio Lightbox Script -->
<!-- ============================== -->

<script>
function openPortfolioLightbox(imgElement){

    let overlay = document.createElement("div");

    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,0.9)";
    overlay.style.display = "flex";
    overlay.style.alignItems = "center";
    overlay.style.justifyContent = "center";
    overlay.style.zIndex = "99999";
    overlay.style.cursor = "zoom-out";

    let img = document.createElement("img");

    img.src = imgElement.src;
    img.style.maxWidth = "90%";
    img.style.maxHeight = "90%";
    img.style.borderRadius = "8px";
    img.style.boxShadow = "0 0 30px rgba(0,0,0,0.5)";

    overlay.appendChild(img);

    overlay.onclick = function(){
        document.body.removeChild(overlay);
    };

    document.body.appendChild(overlay);
}
</script>
